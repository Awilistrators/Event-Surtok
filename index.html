<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Out Event Suryatokoku</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-gradient-to-r from-purple-600 to-pink-500 text-white text-center py-6 shadow-lg">
    <h1 class="text-3xl leading-tight text-center" style="font-family: 'Lilita One', cursive;">
      All Out Event<br>Suryatokoku
    </h1>
    <p class="text-sm opacity-90">Manajemen & Catatan Event</p>
  </div>

  <!-- MAIN -->
  <div id="home" class="p-4 max-w-md mx-auto">
    

    <div id="eventList" class="grid gap-3"></div>

    
  </div>

  <!-- EVENT PAGE -->
  <div id="eventPage" class="hidden p-4 max-w-md mx-auto">
    <button onclick="goHome()" class="mb-4 text-purple-600">← Kembali</button>

    <div id="notesContainer" class="space-y-4"></div>

    <button onclick="addSection()" class="mt-2 bg-purple-600 text-white px-4 py-2 rounded-xl">+ Tambah Judul</button>

    <button onclick="saveNote()" class="mt-4 bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl">
      Simpan
    </button>
  </div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// 🔹 GANTI DENGAN CONFIG FIREBASE MILIKMU
const firebaseConfig = {
  apiKey: "AIzaSyDAuW3ZoAQrWxG2V211l6pHM5J-c_EWveo",
  authDomain: "suryatokoku-event.firebaseapp.com",
  databaseURL: "https://suryatokoku-event-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "suryatokoku-event",
  storageBucket: "suryatokoku-event.firebasestorage.app",
  messagingSenderId: "16304012353",
  appId: "1:16304012353:web:40de1cd98b94462803dac0",
  measurementId: "G-MZ86HBKBME"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let events = [];
let currentIndex = null;

function loadData() {
  db.ref("events").on("value", snapshot => {
    const data = snapshot.val();
    if (data) {
      events = data;
    } else {
      events = [
        { name: "Ramadan Sale", date: "6 - 8 Maret 2026", active: true, sections: [] },
        { name: "Big Sale Vol. 2", date: "12 - 14 Juni 2026", active: false },
        { name: "Fun Bike Part 1", date: "16 Agustus 2026", active: false },
        { name: "Fun Run Part 2", date: "13 September 2026", active: false },
        { name: "Big Sale Vol. 3", date: "29 - 31 Desember 2026", active: false }
      ];
      saveData();
    }
    renderEvents();
  });
}

function saveData() {
  db.ref("events").set(events);
}

function renderEvents() {
  const list = document.getElementById("eventList");
  list.innerHTML = "";

  events.forEach((event, index) => {
    const btn = document.createElement("button");
    btn.className = `shadow active:scale-95 transition p-5 rounded-2xl text-center text-lg font-semibold ${event.active ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'}`;

    btn.innerHTML = `
      <div class="font-semibold">${event.name}</div>
      <div class='text-sm opacity-80 mt-1'>${event.date}</div>
      <div class='mt-2 text-xs font-bold ${event.active ? "text-green-100 bg-green-600" : "text-yellow-800 bg-yellow-300"} inline-block px-3 py-1 rounded-full'>
        ${event.active ? "LIVE" : "SOON"}
      </div>
    `;

    btn.onclick = () => {
      if (!event.active) {
        showModal();
        return;
      }
      openEvent(index);
    };

    list.appendChild(btn);
  });
}

function openEvent(index) {
  currentIndex = index;
  document.getElementById("home").classList.add("hidden");
  document.getElementById("eventPage").classList.remove("hidden");
  renderSections();
}

function renderSections() {
  const container = document.getElementById("notesContainer");
  container.innerHTML = "";

  if (!events[currentIndex].sections) {
    events[currentIndex].sections = [];
  }

  events[currentIndex].sections.forEach((sec, i) => {
    const div = document.createElement("div");
    div.className = "bg-white p-4 rounded-2xl shadow";

    div.innerHTML = `
      <input type="text" placeholder="Judul" value="${sec.title || ''}" 
        oninput="updateSection(${i}, 'title', this.value)"
        class="w-full font-semibold text-lg mb-2 border-b pb-1 outline-none">

      <textarea placeholder="Deskripsi"
        oninput="autoGrow(this); updateSection(${i}, 'desc', this.value)"
        class="w-full text-sm outline-none resize-none overflow-hidden" rows="1">${sec.desc || ''}</textarea>

      <button onclick="saveSection(${i})" class="mt-3 bg-green-500 text-white px-4 py-1 rounded-lg text-sm">Simpan</button>
    `;

    container.appendChild(div);
  });
}

  events[currentIndex].sections.forEach((sec, i) => {
    const div = document.createElement("div");
    div.className = "bg-white p-4 rounded-2xl shadow";

    div.innerHTML = `
      <input type="text" placeholder="Judul" value="${sec.title}" 
        oninput="updateSection(${i}, 'title', this.value)"
        class="w-full font-semibold text-lg mb-2 border-b pb-1 outline-none">

      <textarea placeholder="Deskripsi" 
        oninput="updateSection(${i}, 'desc', this.value)"
        class="w-full text-sm outline-none">${sec.desc}</textarea>
    `;

    container.appendChild(div);
  });
}

function updateSection(i, field, value) {
  events[currentIndex].sections[i][field] = value;
  saveData();
}

function addSection() {
  if (!events[currentIndex].sections) {
    events[currentIndex].sections = [];
  }
  events[currentIndex].sections.push({ title: "", desc: "" });
  saveData();
  renderSections();
}

function saveSection(i) {
  saveData();
  showSavedModal();
}

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}
  events[currentIndex].sections.push({ title: "", desc: "" });
  saveData();
  renderSections();
}

function goHome() {
  document.getElementById("home").classList.remove("hidden");
  document.getElementById("eventPage").classList.add("hidden");
}

// MODAL
function showModal() {
  const modal = document.getElementById("comingSoonModal");
  const box = document.getElementById("modalBox");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
  setTimeout(()=>{
    box.classList.remove("scale-90","opacity-0");
    box.classList.add("scale-100","opacity-100");
  },10);
}

function closeModal() {
  const modal = document.getElementById("comingSoonModal");
  const box = document.getElementById("modalBox");
  box.classList.add("scale-90","opacity-0");
  setTimeout(()=>{
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  },200);
}

loadData();
</script>

  <!-- MODERN POPUP -->
  <div id="comingSoonModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-72 text-center transform scale-90 opacity-0 transition duration-300" id="modalBox">
      <div class="text-3xl mb-2">🚧</div>
      <h3 class="text-lg font-semibold mb-1">Coming Soon</h3>
      <p class="text-sm text-gray-500 mb-4">Event ini belum tersedia.</p>
      <button onclick="closeModal()" class="bg-purple-600 text-white px-5 py-2 rounded-xl">OK</button>
    </div>
  </div>

<script>
function showModal() {
  const modal = document.getElementById("comingSoonModal");
  const box = document.getElementById("modalBox");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
  setTimeout(()=>{
    box.classList.remove("scale-90","opacity-0");
    box.classList.add("scale-100","opacity-100");
  },10);
}

function closeModal() {
  const modal = document.getElementById("comingSoonModal");
  const box = document.getElementById("modalBox");
  box.classList.add("scale-90","opacity-0");
  setTimeout(()=>{
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  },200);
}
</script>
  <!-- SAVED POPUP -->
  <div id="savedModal" class="fixed inset-0 hidden items-center justify-center bg-black/30 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl px-6 py-5 text-center transform scale-90 opacity-0 transition duration-300" id="savedBox">
      <div class="text-2xl mb-1">✅</div>
      <div class="font-semibold">Tersimpan</div>
    </div>
  </div>

<script>
function showSavedModal() {
  const modal = document.getElementById("savedModal");
  const box = document.getElementById("savedBox");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
  setTimeout(()=>{
    box.classList.remove("scale-90","opacity-0");
    box.classList.add("scale-100","opacity-100");
  },10);

  setTimeout(()=>{
    box.classList.add("scale-90","opacity-0");
    setTimeout(()=>{
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    },200);
  },1200);
}
</script>
</body>
</html>
