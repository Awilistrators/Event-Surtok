<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Out Event Suryatokoku</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-gradient-to-r from-purple-600 to-pink-500 text-white text-center py-6 shadow-lg">
    <h1 class="text-3xl font-bold">All Out Event Suryatokoku</h1>
    <p class="text-sm opacity-90">Manajemen & Catatan Event</p>
  </div>

  <!-- MAIN -->
  <div id="home" class="p-4 max-w-md mx-auto">
    <h2 class="text-xl font-semibold mb-4">Daftar Event</h2>

    <div id="eventList" class="grid gap-3"></div>

    
  </div>

  <!-- EVENT PAGE -->
  <div id="eventPage" class="hidden p-4 max-w-md mx-auto">
    <button onclick="goHome()" class="mb-4 text-purple-600">← Kembali</button>

    <input id="eventTitle" type="text" placeholder="Judul catatan..."
      class="w-full text-xl font-bold mb-3 p-3 border rounded-xl" />

    <textarea id="eventDesc" placeholder="Tulis deskripsi atau catatan event di sini..."
      class="w-full h-72 p-3 border rounded-xl text-base"></textarea>

    <button onclick="saveNote()" class="mt-4 bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl">
      Simpan
    </button>
  </div>

<script>
  const events = [
    { name: "Ramadan Sale (6 - 8 Maret 2026)", active: true, note: "" },
    { name: "Big Sale Vol. 2 (12 - 14 Juni 2026)", active: false },
    { name: "Fun Bike Part 1 (16 Agustus 2026)", active: false },
    { name: "Fun Run Part 2 (13 September 2026)", active: false },
    { name: "Big Sale Vol. 3 (29 - 31 Desember 2026)", active: false }
  ];

  let currentIndex = null;

  function renderEvents() {
    const list = document.getElementById("eventList");
    list.innerHTML = "";

    events.forEach((event, index) => {
      const btn = document.createElement("button");
      btn.className = `shadow active:scale-95 transition p-5 rounded-2xl text-center text-lg font-semibold ${event.active ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'}`;
      btn.innerText = event.name;

      btn.onclick = () => {
        if (!event.active) {
          showModal();
          return;
        }
        openEvent(index);
      };

      list.appendChild(btn);
    });
  }

  function openEvent(index) {
    currentIndex = index;
    document.getElementById("home").classList.add("hidden");
    document.getElementById("eventPage").classList.remove("hidden");

    document.getElementById("eventTitle").value = events[index].name;
    document.getElementById("eventDesc").value = events[index].note || "";
  }

  function saveNote() {
    events[currentIndex].name = document.getElementById("eventTitle").value;
    events[currentIndex].note = document.getElementById("eventDesc").value;
    alert("Catatan tersimpan di browser ini");
    goHome();
  }

  function goHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("eventPage").classList.add("hidden");
    renderEvents();
  }

  // render saat halaman dibuka
  document.addEventListener("DOMContentLoaded", renderEvents);
</script>

  <!-- MODERN POPUP -->
  <div id="comingSoonModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-72 text-center transform scale-90 opacity-0 transition duration-300" id="modalBox">
      <div class="text-3xl mb-2">🚧</div>
      <h3 class="text-lg font-semibold mb-1">Coming Soon</h3>
      <p class="text-sm text-gray-500 mb-4">Event ini belum tersedia.</p>
      <button onclick="closeModal()" class="bg-purple-600 text-white px-5 py-2 rounded-xl">OK</button>
    </div>
  </div>

<script>
function showModal() {
  const modal = document.getElementById("comingSoonModal");
  const box = document.getElementById("modalBox");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
  setTimeout(()=>{
    box.classList.remove("scale-90","opacity-0");
    box.classList.add("scale-100","opacity-100");
  },10);
}

function closeModal() {
  const modal = document.getElementById("comingSoonModal");
  const box = document.getElementById("modalBox");
  box.classList.add("scale-90","opacity-0");
  setTimeout(()=>{
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  },200);
}
</script>
</body>
</html>
