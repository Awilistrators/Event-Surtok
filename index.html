<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>All Out Event</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="header-gradient text-white text-center py-6 shadow">
  <h1 class="text-3xl title-font">
    All Out Event<br>Suryatokoku 2026
  </h1>
</div>

<!-- EVENT LIST -->
<div class="p-4 max-w-md mx-auto grid gap-3">

  <!-- LIVE -->
  <a href="ramadan.html" class="card-btn bg-green-500 text-white">
    <div class="font-semibold">Ramadan Sale</div>
    <div class="text-sm opacity-80">6 - 8 Maret 2026</div>
    <div class="badge live">LIVE</div>
  </a>

  <!-- SOON -->
  <button onclick="comingSoon()" class="card-btn bg-gray-200 text-gray-500">
    <div class="font-semibold">Big Sale Vol. 2</div>
    <div class="text-sm">12 - 14 Juni 2026</div>
    <div class="badge soon">SOON</div>
  </button>

  <button onclick="comingSoon()" class="card-btn bg-gray-200 text-gray-500">
    <div class="font-semibold">Fun Bike Part 1</div>
    <div class="text-sm">16 Agustus 2026</div>
    <div class="badge soon">SOON</div>
  </button>

  <button onclick="comingSoon()" class="card-btn bg-gray-200 text-gray-500">
    <div class="font-semibold">Fun Run Part 2</div>
    <div class="text-sm">13 September 2026</div>
    <div class="badge soon">SOON</div>
  </button>

</div>

<!-- POPUP -->
<div id="soonModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white p-6 rounded-xl text-center shadow">
    🚧 Coming Soon
  </div>
</div>

<script>
function comingSoon(){
  const m=document.getElementById("soonModal");
  m.classList.remove("hidden");
  m.classList.add("flex");
  setTimeout(()=>m.classList.add("hidden"),1200);
}
</script>

</body>
</html>
