<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Sale</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

<div class="bg-white text-center py-5 shadow-sm">
  <img src="Logo Ramadhan Sale.png"
       alt="Ramadan Sale"
       class="mx-auto h-20 object-contain drop-shadow-sm">
</div>

<div class="p-4 max-w-md mx-auto">

<button onclick="location.href='index.html'" class="mb-4 text-purple-600">
← Kembali
</button>

<div id="notes" class="space-y-4"></div>

<button onclick="addSection()" class="btn-primary">
+ Tambah Judul
</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDAuW3ZoAQrWxG2V211l6pHM5J-c_EWveo",
  authDomain: "suryatokoku-event.firebaseapp.com",
  databaseURL: "https://suryatokoku-event-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "suryatokoku-event",
  storageBucket: "suryatokoku-event.firebasestorage.app",
  messagingSenderId: "16304012353",
  appId: "1:16304012353:web:40de1cd98b94462803dac0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sections=[];

function loadData(){
  db.ref("ramadanSale").on("value",snap=>{
    sections=snap.val() || [];
    render();
  });
}

function save(){
  db.ref("ramadanSale").set(sections);
}

function render(){
  const container=document.getElementById("notes");
  container.innerHTML="";

  sections.forEach((s,i)=>{
    const box=document.createElement("div");
    box.className="note-box";

    box.innerHTML=`
      <div class="flex justify-between items-start mb-2">

        <input id="title-${i}" value="${s.title||''}"
  class="w-full font-semibold text-center text-lg border-b outline-none bg-transparent disabled:border-transparent"
  disabled>

        <div class="flex gap-2 ml-2">

          <button id="editBtn-${i}" onclick="editSection(${i})">✏️</button>

          <button onclick="deleteSection(${i})">🗑</button>

          <button id="saveBtn-${i}" onclick="saveSection(${i})"
            class="hidden text-green-600 font-bold">💾</button>

        </div>

      </div>

      <textarea id="desc-${i}" rows="1"
  class="w-full outline-none bg-transparent resize-none overflow-hidden"
  disabled>${s.desc||''}</textarea>
    container.appendChild(box);
    setTimeout(() => {
  document.querySelectorAll("textarea").forEach(autoResize);
}, 0);
  });
}
  
function addSection(){
  sections.push({title:"",desc:""});
  save();
}

function saveSection(i){
  sections[i].title = document.getElementById(`title-${i}`).value;
  sections[i].desc = document.getElementById(`desc-${i}`).value;

  save();
  render();
}

function deleteSection(i){
  if(confirm("Hapus bagian ini?")){
    sections.splice(i,1);
    save();
  }
}

function editSection(i){
  const title = document.getElementById(`title-${i}`);
  const desc  = document.getElementById(`desc-${i}`);

  title.disabled = false;
  desc.disabled  = false;

  desc.oninput = () => autoResize(desc);

  title.focus();

  document.getElementById(`editBtn-${i}`).classList.add("hidden");
  document.getElementById(`saveBtn-${i}`).classList.remove("hidden");

  autoResize(desc);
}

function autoResize(el){
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

loadData();
</script>

</body>
</html>
