<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Sale</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body{
  overflow-x:hidden;
  background:#f3f4f6;
}

/* HEADER */
.header-logo{
  background:white;
  text-align:center;
  padding:18px 0;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
}

/* BUTTON */
.btn-primary{
  background: linear-gradient(90deg,#9333ea,#ec4899);
  color:white;
  border-radius:14px;
  padding:12px;
  width:100%;
  text-align:center;
  display:block;
  margin-top:14px;
  font-weight:500;
}

/* DOCUMENT WRAPPER */
.doc-fit{
  width:100%;
  overflow:hidden;
  background:white;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* iframe normal */
.doc-fit iframe{
  width:100%;
  height:70vh;
  border:0;
}

/* MOBILE AUTO FIT */
@media (max-width:768px){
  .doc-fit iframe{
    transform:scale(0.64);
    transform-origin:top left;
    width:156%;
    height:100vh;
  }
}

/* FULLSCREEN MODE */
.fullscreen{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:white;
  z-index:9999;
  padding:10px;
}

.fullscreen iframe{
  height:100%;
}

/* close button */
.close-btn{
  position:absolute;
  top:10px;
  right:12px;
  background:#9333ea;
  color:white;
  padding:6px 12px;
  border-radius:8px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header-logo">
  <img src="Logo Ramadhan Sale.png"
       class="mx-auto h-20 object-contain">
</div>

<div class="px-4 py-4">

<button onclick="location.href='index.html'"
        class="mb-4 text-purple-600 text-lg">
← Kembali
</button>

<!-- DOCUMENT -->
<div id="docBox" class="doc-fit">
  <iframe
    src="https://docs.google.com/document/d/e/2PACX-1vS1WjeYZkT1sc0iOT30YWsa2dX9XzXJqgFhmjS7G5B_VH6ToJcObkCzKioENvstCuZiR5HsHH7eqvCG/pub?embedded=true">
  </iframe>
</div>

<!-- FULLSCREEN BUTTON -->
<button onclick="openFullscreen()" class="btn-primary">
🖥 Full Screen
</button>

<!-- EDIT BUTTON -->
<a href="https://docs.google.com/document/d/1qPwm76zb5mqvxtDN_ZLN07SNT_hm9c9_HmuIDE1-N5s/edit"
   target="_blank"
   class="btn-primary">
✏️ Edit Dokumen
</a>

</div>

<script>
function openFullscreen(){
  const box = document.getElementById("docBox");
  box.classList.add("fullscreen");

  const closeBtn = document.createElement("button");
  closeBtn.innerText = "Tutup";
  closeBtn.className = "close-btn";
  closeBtn.onclick = () => {
    box.classList.remove("fullscreen");
    closeBtn.remove();
  };

  box.appendChild(closeBtn);
}
</script>

</body>
</html>
