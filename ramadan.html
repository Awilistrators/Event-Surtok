<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Sale</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f3f4f6;
  overflow-x:hidden;
}

/* logo */
.logo{
  height:70px;
}

/* wrapper dokumen */
.doc-wrapper{
  width:100%;
  max-width:900px;
  margin:auto;
}

/* iframe dokumen */
.doc-wrapper iframe{
  width:100%;
  height:85vh;
  border:0;
}

/* tombol */
.btn-primary{
  background:linear-gradient(90deg,#9333ea,#ec4899);
  color:white;
  border-radius:14px;
  padding:12px;
  text-align:center;
  display:block;
  margin-top:16px;
  font-weight:500;
}

/* mobile adjustment */
@media (max-width:768px){
  .logo{
    height:60px;
  }
  .doc-wrapper{
    max-width:100%;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="bg-white text-center py-5 shadow-sm">
  <img src="Logo Ramadhan Sale.png"
       class="logo mx-auto object-contain drop-shadow-sm">
</div>

<div class="px-4 py-4">

<button onclick="location.href='index.html'" class="mb-4 text-purple-600">
← Kembali
</button>

<!-- DOKUMEN -->
<div class="doc-wrapper bg-white rounded-xl shadow overflow-hidden">
  <iframe
    src="https://docs.google.com/document/d/e/2PACX-1vS1WjeYZkT1sc0iOT30YWsa2dX9XzXJqgFhmjS7G5B_VH6ToJcObkCzKioENvstCuZiR5HsHH7eqvCG/pub?embedded=true">
  </iframe>
</div>

<a href="https://docs.google.com/document/d/1qPwm76zb5mqvxtDN_ZLN07SNT_hm9c9_HmuIDE1-N5s/edit"
   target="_blank"
   class="btn-primary">
   ✏️ Edit Dokumen
</a>

</div>

</body>
</html>
