<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Sale</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

<div class="bg-purple-600 text-center py-4 shadow">
  <img src="Ramadan Sale Suryatokoku.png"
       alt="Ramadan Sale"
       class="mx-auto h-14 object-contain">
</div>

<div class="p-4 max-w-md mx-auto">

<button onclick="location.href='index.html'" class="mb-4 text-purple-600">
← Kembali
</button>

<div id="notes" class="space-y-4"></div>

<button onclick="addSection()" class="btn-primary">
+ Tambah Judul
</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDAuW3ZoAQrWxG2V211l6pHM5J-c_EWveo",
  authDomain: "suryatokoku-event.firebaseapp.com",
  databaseURL: "https://suryatokoku-event-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "suryatokoku-event",
  storageBucket: "suryatokoku-event.firebasestorage.app",
  messagingSenderId: "16304012353",
  appId: "1:16304012353:web:40de1cd98b94462803dac0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sections=[];

function loadData(){
  db.ref("ramadanSale").on("value",snap=>{
    sections=snap.val() || [];
    render();
  });
}

function save(){
  db.ref("ramadanSale").set(sections);
}

function render(){
  const container=document.getElementById("notes");
  container.innerHTML="";

  sections.forEach((s,i)=>{
    const box=document.createElement("div");
    box.className="note-box";

    box.innerHTML=`
      <input value="${s.title||''}"
        oninput="update(${i},'title',this.value)"
        class="w-full font-semibold border-b mb-2 outline-none"
        placeholder="Judul">

      <textarea rows="1"
        oninput="autoGrow(this);update(${i},'desc',this.value)"
        class="w-full outline-none"
        placeholder="Deskripsi">${s.desc||''}</textarea>
    `;

    container.appendChild(box);
  });
}

function update(i,field,value){
  sections[i][field]=value;
  save();
}

function addSection(){
  sections.push({title:"",desc:""});
  save();
}

function autoGrow(el){
  el.style.height="auto";
  el.style.height=el.scrollHeight+"px";
}

loadData();
</script>

</body>
</html>
