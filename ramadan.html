<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Sale</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

<!-- QUILL EDITOR -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-white text-center py-5 shadow-sm">
  <img src="Logo Ramadhan Sale.png"
       alt="Ramadan Sale"
       class="mx-auto h-20 object-contain drop-shadow-sm">
</div>

<div class="p-4 max-w-md mx-auto">

<button onclick="location.href='index.html'" class="mb-4 text-purple-600">
← Kembali
</button>

<div id="notes" class="space-y-6"></div>

<button onclick="addSection()" class="btn-primary">
+ Tambah Judul
</button>

</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-72 text-center">
    <div class="text-3xl mb-2">⚠️</div>
    <h3 class="font-semibold text-lg mb-2">Hapus bagian?</h3>
    <p class="text-sm text-gray-500 mb-4">Data yang dihapus tidak bisa dikembalikan.</p>

    <div class="flex gap-3 justify-center">
      <button onclick="closeDeleteModal()" class="px-4 py-2 rounded-lg bg-gray-200">
        Batal
      </button>

      <button id="confirmDeleteBtn" class="px-4 py-2 rounded-lg bg-red-500 text-white">
        Hapus
      </button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- Quill -->
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDAuW3ZoAQrWxG2V211l6pHM5J-c_EWveo",
  authDomain: "suryatokoku-event.firebaseapp.com",
  databaseURL: "https://suryatokoku-event-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "suryatokoku-event",
  storageBucket: "suryatokoku-event.firebasestorage.app",
  messagingSenderId: "16304012353",
  appId: "1:16304012353:web:40de1cd98b94462803dac0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sections = [];
let deleteIndex = null;

// LOAD DATA
function loadData(){
  db.ref("ramadanSale").on("value", snap=>{
    sections = snap.val() || [];
    render();
  });
}

// SAVE DATA
function save(){
  db.ref("ramadanSale").set(sections);
}

// RENDER
function render(){
  const container = document.getElementById("notes");
  container.innerHTML = "";

  sections.forEach((s,i)=>{
    const box = document.createElement("div");
    box.className = "note-box";

    box.innerHTML = `
      <div class="flex justify-between items-start mb-2">

        <input id="title-${i}" value="${s.title||''}"
          class="w-full font-semibold text-center text-lg border-b outline-none bg-transparent"
          disabled>

        <div class="flex gap-2 ml-2">
          <button id="editBtn-${i}" onclick="editSection(${i})">✏️</button>
          <button onclick="deleteSection(${i})">🗑</button>
          <button id="saveBtn-${i}" onclick="saveSection(${i})"
            class="hidden text-green-600 font-bold">💾</button>
        </div>

      </div>

      <div id="editor-${i}"></div>
    `;

    container.appendChild(box);
  });

  // INIT QUILL EDITOR
  sections.forEach((s,i)=>{
    const quill = new Quill(`#editor-${i}`, {
      theme: "snow",
      readOnly: true,
      modules: {
        toolbar: [
          ['bold','italic','underline'],
          [{ 'color': [] }],
          [{ 'list': 'bullet' }],
          ['link']
        ]
      }
    });

    quill.root.innerHTML = s.desc || "";
    sections[i].quill = quill;
  });
}

// ADD SECTION
function addSection(){
  sections.push({title:"",desc:""});
  save();
}

// EDIT
function editSection(i){
  document.getElementById(`title-${i}`).disabled = false;
  sections[i].quill.enable(true);

  document.getElementById(`editBtn-${i}`).classList.add("hidden");
  document.getElementById(`saveBtn-${i}`).classList.remove("hidden");
}

// SAVE
function saveSection(i){
  sections[i].title = document.getElementById(`title-${i}`).value;
  sections[i].desc  = sections[i].quill.root.innerHTML;

  sections[i].quill.enable(false);

  save();
  render();
}

// DELETE POPUP
function deleteSection(i){
  deleteIndex = i;
  document.getElementById("deleteModal").classList.remove("hidden");
  document.getElementById("deleteModal").classList.add("flex");
}

function closeDeleteModal(){
  document.getElementById("deleteModal").classList.add("hidden");
  document.getElementById("deleteModal").classList.remove("flex");
}

document.getElementById("confirmDeleteBtn").onclick = function(){
  if(deleteIndex !== null){
    sections.splice(deleteIndex,1);
    save();
    closeDeleteModal();
  }
};

loadData();
</script>

</body>
</html>
